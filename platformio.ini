; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.variant = adafruit_feather_esp32c6
framework = arduino
monitor_speed = 115200
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ARDUINO_USB_MODE=1
	-D CONFIG_ARDUINO_USB_CDC_ENABLED=1
	-D ARDUINO_ADAFRUIT_FEATHER_ESP32C6
;lib_deps = 
;	adafruit/Adafruit BusIO; Can it be that this is causing the error???

[env:main]
;build_src_filter = -<*> +<${PROJECT_DIR}/src/main.cpp>
build_src_filter = -<*> +<main.cpp>
lib_deps = 
	;SD
	;adafruit/Adafruit BusIO
	adafruit/Adafruit BME280 Library @ ^2.2.2
	;adafruit/Adafruit Unified Sensor @ ^1.1.14
	adafruit/Adafruit GFX Library @ ^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0

[env:example-bme280]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/bme280/*>
lib_deps = 
	adafruit/Adafruit BME280 Library @ ^2.2.2
	adafruit/Adafruit Unified Sensor @ ^1.1.14
	adafruit/Adafruit GFX Library @ ^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0

[env:example-neopixel]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/neopixel/*>
lib_deps = 
	adafruit/Adafruit NeoPixel @ ^1.15.1

[env:example-sd]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/sd/*>
;lib_deps = 
	;arduino-libraries/SD @ ^1.3.0 ; When I add this the compilation fails
	;adafruit/Adafruit BME280 Library @ ^2.2.2
	;adafruit/Adafruit Unified Sensor @ ^1.1.14
	;adafruit/Adafruit GFX Library @ ^1.12.3
	;adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0

[env:example-display]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/display/*>
lib_deps = 
	;adafruit/Adafruit BusIO ;not needed for the display
	adafruit/Adafruit GFX Library @ ^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0

[platformio]
description = Project for my Wearable Electronics Gadget
