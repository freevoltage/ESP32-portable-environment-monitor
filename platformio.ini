; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = main
description = Project for my Wearable Electronics Gadget

[env]
platform = https://github.com/tasmota/platform-espressif32.git
board = esp32-c6-devkitc-1
board_build.variant = adafruit_feather_esp32c6
framework = arduino
monitor_speed = 115200
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ARDUINO_USB_MODE=1
	-D CONFIG_ARDUINO_USB_CDC_ENABLED=1
	-D ARDUINO_ADAFRUIT_FEATHER_ESP32C6

[env:main]
build_src_filter = -<*> +<*>
lib_deps = 
	adafruit/Adafruit BME280 Library @ ^2.2.2
	adafruit/Adafruit GFX Library @ ^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	SD @ ^3.3.0

[env:example-bme280]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/bme280/*>
lib_deps = adafruit/Adafruit BME280 Library @ ^2.2.2

[env:example-neopixel]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/neopixel/*>
lib_deps = adafruit/Adafruit NeoPixel @ ^1.15.1

[env:example-sd]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/sd/*>
lib_deps = SD @ ^3.3.0

[env:example-display]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/display/*>
lib_deps = 
	adafruit/Adafruit GFX Library @ ^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0

[env:example-rtc]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/rtc/*>
lib_deps = fbiego/ESP32Time @ ^2.0.6

[env:example-deep-sleep]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/deep_sleep/*>

[env:example-blink]
build_src_filter = -<*> +<${PROJECT_DIR}/examples/blink/*>

[env:example-bme280-sd]
build_src_filter = 
	-<*>
	+<${PROJECT_DIR}/examples/bme280-sd/*>
	+<${PROJECT_DIR}/include/config.h>
	+<${PROJECT_DIR}/src/sensor.cpp>
	+<${PROJECT_DIR}/src/storage.cpp>
lib_deps = 
	adafruit/Adafruit BME280 Library @ ^2.2.2
	SD @ ^3.3.0
