[env:esp32dev]
platform = https://github.com/tasmota/platform-espressif32.git
board = adafruit_feather_esp32c6
framework = arduino
monitor_speed = 115200
# Include any external dependencies your display needs
lib_deps = 
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO @ ^1.17.0
build_flags = 
    ;-I../../include  # Points to your main include folder
    -I../../src/  # Points to the folder containing display_manger.h and .cpp file
    -I../../../../include/ ; Points tot he Main Folders Include Library: For data_structures.h
    -D DISPLAY_EXAMPLE=1
;lib_extra_dirs = 
    ;+<${PROJECT_DIR}/../../../../include/*>; Points to the main projects include directory
    ;+<${PROJECT_DIR}/src> ; Makes Sure display_manager.h can be found - does not work
lib_extra_dirs = ../../../ 

